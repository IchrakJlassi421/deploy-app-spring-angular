name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN5 }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest

      # TEST SIMPLE SANS MODIFIER LE FICHIER DU PROF
      - name: Test with Docker Compose
        run: |
          # 1. Démarrer MySQL d'abord
          docker compose up -d mysql
          sleep 15
          
          # 2. Attendre que MySQL soit prêt
          echo "Attente de MySQL..."
          for i in {1..20}; do
            if docker compose exec mysql mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null; then
              echo "✅ MySQL prêt"
              break
            fi
            sleep 3
          done
          
          # 3. Démarrer le backend et frontend
          docker compose up -d spring-boot-app angular-app
          sleep 20
          
          # 4. Vérifier les conteneurs
          echo "=== CONTENEURS ==="
          docker compose ps
          
          # 5. Tester le frontend
          echo "=== TEST FRONTEND (port 4200) ==="
          curl -f http://localhost:4200 && echo "✅ Frontend OK"
          
          # 6. Tester le backend
          echo "=== TEST BACKEND (port 8081) ==="
          curl -f http://localhost:8081/api/hello && echo "✅ Backend OK" || echo "⚠️ Backend non accessible"
          
          # 7. Afficher les logs
          echo "=== LOGS ==="
          docker compose logs --tail=30
          
          # 8. Nettoyer
          docker compose down
