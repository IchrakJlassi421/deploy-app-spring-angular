name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN5 }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest

      # 🔴 NOUVELLE ÉTAPE : Modifier docker-compose pour utiliser VOS images
      - name: Update docker-compose.yml with your images
        run: |
          echo "========================================="
          echo "🔄 Mise à jour du docker-compose.yml"
          echo "========================================="
          # Sauvegarder l'original
          cp docker-compose.yml docker-compose.yml.backup
          
          # Remplacer les images nouran10 par vos images
          sed -i "s|nouran10/angular-app|${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|nouran10/springboot-app|${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest|g" docker-compose.yml
          
          echo "✅ docker-compose.yml mis à jour :"
          echo "-----------------------------------------"
          cat docker-compose.yml
          echo "-----------------------------------------"
      - name: Debug backend error
        run: |
          echo "========================================="
          echo "🔍 DÉMARRAGE DU BACKEND SEUL"
          echo "========================================="
          docker compose up -d mysql
          sleep 15
          docker compose up -d spring-boot-app
          sleep 10
          echo "========================================="
          echo "📋 LOGS DU BACKEND (ERREUR)"
          echo "========================================="
          docker compose logs spring-boot-app --tail=100
          echo "========================================="
          echo "🧹 NETTOYAGE"
          echo "========================================="
          docker compose down


      - name: Test with Docker Compose
        run: |
          echo "========================================="
          echo "🚀 ÉTAPE 1: Démarrage des conteneurs"
          echo "========================================="
          docker compose up -d
          sleep 25
          
          echo "========================================="
          echo "🔍 ÉTAPE 2: Vérification des conteneurs"
          echo "========================================="
          docker compose ps
          
          echo "========================================="
          echo "🔍 ÉTAPE 3: Test Backend (port 8081)"
          echo "========================================="
          if curl -s -f http://localhost:8081/actuator/health; then
            echo "✅✅✅ BACKEND OK ✅✅✅"
          else
            echo "❌❌❌ BACKEND ERROR ❌❌❌"
            echo "📋 Logs du backend :"
            docker compose logs spring-boot-app --tail=50
            exit 1
          fi
          
          echo "========================================="
          echo "🔍 ÉTAPE 4: Test Frontend (port 4200)"
          echo "========================================="
          if curl -s -f http://localhost:4200; then
            echo "✅✅✅ FRONTEND OK ✅✅✅"
          else
            echo "❌❌❌ FRONTEND ERROR ❌❌❌"
            docker compose logs angular-app --tail=50
            exit 1
          echo "========================================="
          echo "========================================="
          if curl -s -f http://localhost:8081/api/hello; then
            echo "✅✅✅ API OK - Frontend peut communiquer avec Backend ✅✅✅"
          fi
          
          echo "📋 ÉTAPE 6: Affichage des logs"
          
          echo "========================================="
          echo "🧹 ÉTAPE 7: Arrêt des conteneurs"
          echo "========================================="
          docker compose down
          echo "🎉🎉🎉 TESTS TERMINÉS AVEC SUCCÈS 🎉🎉🎉"
          echo "========================================="          echo "========================================="
          
          echo "========================================="
          docker compose logs --tail=30
          echo "========================================="
            echo "❌❌❌ API ERROR - Problème de communication ❌❌❌"
          else
          echo "🔍 ÉTAPE 5: Test API (communication)"
          fi

