name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

     
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN5 }}

      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest

      
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest
- name: Test with Docker Compose
  run: |
    docker-compose up -d
    sleep 25
    
    echo "=== VÉRIFICATION DES CONTENEURS ==="
    docker-compose ps
    
    echo "=== TEST BACKEND (port 8081) ==="
    curl -f http://localhost:8081/actuator/health && echo "✅ Backend OK"
    
    echo "=== TEST FRONTEND (port 4200) ==="
    curl -f http://localhost:4200 && echo "✅ Frontend OK"
    
    echo "=== TEST API ==="
    curl -f http://localhost:8081/api/hello && echo "✅ API OK"
    
    echo "=== LOGS ==="
    docker-compose logs --tail=20
    
    docker-compose down
