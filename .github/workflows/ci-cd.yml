name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN5 }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest
       # 🔴 ÉTAPE CRUCIALE : Utiliser VOS images pour le test
      - name: Use your own images for testing
        run: |
          echo "========================================="
          echo "🔄 REMPLACEMENT DES IMAGES DANS DOCKER-COMPOSE"
          echo "========================================="
          sed -i "s|nouran10/angular-app|${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|nouran10/springboot-app|${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest|g" docker-compose.yml
          echo "✅ docker-compose.yml modifié :"
          cat docker-compose.yml
      - name: Test and discover endpoints
        run: |
          echo "========================================="
          echo "🚀 DÉMARRAGE DE MYSQL"
          echo "========================================="
          docker compose up -d mysql
          sleep 15
          
          echo "⏳ Attente de MySQL..."
          for i in {1..20}; do
            if docker compose exec mysql mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null; then
              echo "✅ MySQL prêt"
              break
            fi
            sleep 2
          done
          
          echo "========================================="
          echo "🚀 DÉMARRAGE BACKEND ET FRONTEND"
          echo "========================================="
          docker compose up -d spring-boot-app angular-app
          sleep 25
          
          echo "========================================="
          echo "🔍 ÉTAT DES CONTENEURS"
          echo "========================================="
          docker compose ps
          
          echo "========================================="
          echo "🔍 TEST FRONTEND"
          echo "========================================="
          curl -f http://localhost:4200 && echo "✅ Frontend OK"
          
          echo "========================================="
          echo "🔍 RECHERCHE DES ENDPOINTS BACKEND"
          echo "========================================="
          
          ENDPOINTS=(
            "/"
            "/api"
            "/api/hello"
            "/api/users"
            "/hello"
            "/users"
            "/actuator"
            "/actuator/health"
            "/health"
            "/info"
            "/test"
          )
          
          FOUND=0
          for endpoint in "${ENDPOINTS[@]}"; do
            echo -n "🔍 Test: http://localhost:8081$endpoint ... "
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081$endpoint)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ TROUVÉ (code $HTTP_CODE)"
              echo "   Réponse: $(curl -s http://localhost:8081$endpoint | head -c 100)"
              FOUND=1
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "❌ Non trouvé (404)"
            else
              echo "⚠️ Code $HTTP_CODE"
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo "========================================="
            echo "✅✅✅ AU MOINS UN ENDPOINT FONCTIONNE ✅✅✅"
          else
            echo "========================================="
            echo "❌❌❌ AUCUN ENDPOINT TROUVÉ ❌❌❌"
            echo "📋 Logs du backend:"
            docker compose logs spring-boot-app --tail=50
          fi
          
          echo "========================================="
          echo "🧹 NETTOYAGE"
          echo "========================================="
          docker compose down
