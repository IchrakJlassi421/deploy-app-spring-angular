name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Se connecter à Docker Hub avec VOS secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.dockerhub_ICHRAK }}   # ✅ AVEC VOTRE NOM
          password: ${{ secrets.dockerhub_TOKEN }}    # ✅ AVEC VOTRE NOM

      # 4️⃣ Builder l'image Docker du backend
      - name: Build backend Docker image
        run: docker build -t ${{ secrets.dockerhub_ICHRAK }}/backend:latest ./backend

      # 5️⃣ Builder l'image Docker du frontend
      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.dockerhub_ICHRAK }}/frontend:latest ./frontend

      # 6️⃣ Pousser les images Docker sur Docker Hub
      - name: Push backend Docker image
        run: docker push ${{ secrets.dockerhub_ICHRAK }}/backend:latest

      - name: Push frontend Docker image
        run: docker push ${{ secrets.dockerhub_ICHRAK }}/frontend:latest

      # 7️⃣ Lancer l'application complète avec Docker Compose
      - name: Run Docker Compose
        run: docker-compose up -d

      # 8️⃣ Vérifier les logs
      - name: Check logs
        run: |
          sleep 10
          docker-compose logs

      # 9️⃣ Nettoyage
      - name: Stop Docker Compose
        run: docker-compose down
