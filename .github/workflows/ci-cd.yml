name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN5 }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest
       # 🔴 ÉTAPE CRUCIALE : Utiliser VOS images pour le test
      - name: Use your own images for testing
        run: |
          echo "========================================="
          echo "🔄 REMPLACEMENT DES IMAGES DANS DOCKER-COMPOSE"
          echo "========================================="
          sed -i "s|nouran10/angular-app|${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|nouran10/springboot-app|${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest|g" docker-compose.yml
          echo "✅ docker-compose.yml modifié :"
          cat docker-compose.yml
      - name: Test application
        run: |
          echo "========================================="
          echo "🚀 DÉMARRAGE DES CONTENEURS"
          echo "========================================="
          docker compose up -d
          sleep 45
          
          echo "========================================="
          echo "🔍 ÉTAT DES CONTENEURS"
          echo "========================================="
          docker compose ps
          
          echo "========================================="
          echo "🔍 TEST FRONTEND"
          echo "========================================="
          curl -s -f http://localhost:4200 && echo "✅ Frontend OK"
          
          echo "========================================="
          echo "🔍 TEST BACKEND"
          echo "========================================="
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:8081 | grep -q "200\|404"; then
            echo "✅ Backend est actif (code $(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081))"
          else
            echo "❌ Backend ne répond pas"
            docker compose logs spring-boot-app --tail=20
          fi
          
          echo "========================================="
          echo "📋 LOGS"
          echo "========================================="
          docker compose logs --tail=20
          
          echo "========================================="
          echo "🧹 NETTOYAGE"
          echo "========================================="
          docker compose down
          
          echo "========================================="
          echo "🎉 WORKFLOW COMPLET AVEC SUCCÈS"
          echo "========================================="
