name: CI/CD Pipeline

# Déclenchement du workflow à chaque push sur main
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Se connecter à Docker Hub avec les secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      
      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_ICHRAK }}/backend:latest ./backend

      
      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_ICHRAK }}/frontend:latest ./frontend

      
      - name: Push backend Docker image
        run: docker push ${{ secrets.DOCKERHUB_ICHRAK }}/backend:latest

      - name: Push frontend Docker image
        run: docker push ${{ secrets.DOCKERHUB_ICHRAK }}/frontend:latest

      
      - name: Run Docker Compose
        run: docker-compose up -d --build

      
      - name: Check logs
        run: docker-compose logs

      # 9️⃣ Nettoyage des containers
      - name: Stop Docker Compose
        run: docker-compose down
