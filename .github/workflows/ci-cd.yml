name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

- name: Set up Docker Buildx
  uses: docker/setup-buildx-action@v3

- name: Login to Docker Hub
  uses: docker/login-action@v2
  with:
    username: ${{ secrets.DOCKERHUB_ }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}

- name: Build backend Docker image
  run: docker build -t <TON_DOCKERHUB_USERNAME>/backend:latest ./backend

- name: Build frontend Docker image
  run: docker build -t <TON_DOCKERHUB_USERNAME>/frontend:latest ./frontend

- name: Push backend Docker image
  run: docker push <TON_DOCKERHUB_USERNAME>/backend:latest

- name: Push frontend Docker image

