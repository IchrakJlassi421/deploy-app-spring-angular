name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_ICHRAK }}
          password: ${{ secrets.DOCKERHUB_TOKEN5 }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          file: ./springboot/app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          file: ./angular-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest

      # 🔴 REMPLACER LES IMAGES DANS DOCKER-COMPOSE
      - name: Use your own images for testing
        run: |
          echo "========================================="
          echo "🔄 REMPLACEMENT DES IMAGES DANS DOCKER-COMPOSE"
          echo "========================================="
          sed -i "s|nouran10/angular-app|${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|nouran10/springboot-app|${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest|g" docker-compose.yml
          echo "✅ docker-compose.yml modifié avec vos images"
          echo "----------------------------------------"
          cat docker-compose.yml
          echo "----------------------------------------"

      # 🔴 TEST COMPLET DE L'APPLICATION
      - name: Test application
        run: |
          echo "========================================="
          echo "🚀 ÉTAPE 1: DÉMARRAGE DE MYSQL"
          echo "========================================="
          docker compose up -d mysql
          
          echo "⏳ Attente de MySQL..."
          for i in {1..20}; do
            if docker compose exec mysql mysqladmin ping -h localhost -uroot -proot --silent 2>/dev/null; then
              echo "✅ MySQL prêt après $i secondes"
              break
            fi
            echo "⏳ En attente de MySQL... $i/20"
            sleep 2
          done
          
          echo "========================================="
          echo "🚀 ÉTAPE 2: DÉMARRAGE BACKEND ET FRONTEND"
          echo "========================================="
          docker compose up -d spring-boot-app angular-app
          
          echo "⏳ Attente du démarrage (20 secondes)..."
          sleep 20
          
          echo "========================================="
          echo "🔍 ÉTAPE 3: ÉTAT DES CONTENEURS"
          echo "========================================="
          docker compose ps
          
          echo "========================================="
          echo "🔍 ÉTAPE 4: TEST FRONTEND"
          echo "========================================="
          if curl -s -f http://localhost:4200 > /dev/null; then
            echo "✅✅✅ FRONTEND OK - Accessible sur port 4200 ✅✅✅"
          else
            echo "❌❌❌ FRONTEND ERROR ❌❌❌"
            docker compose logs angular-app --tail=20
          fi
          
          echo "========================================="
          echo "🔍 ÉTAPE 5: TEST BACKEND (VÉRIFICATION DÉMARRAGE)"
          echo "========================================="
          
          # Vérifier si le backend a démarré
          BACKEND_LOGS=$(docker compose logs spring-boot-app)
          
          if echo "$BACKEND_LOGS" | grep -q "Started DemoApplication"; then
            echo "✅✅✅ BACKEND DÉMARRÉ AVEC SUCCÈS ✅✅✅"
            echo "   -> L'application Spring Boot a démarré complètement"
          else
            echo "❌❌❌ BACKEND NON DÉMARRÉ ❌❌❌"
            echo "📋 Dernières lignes des logs:"
            docker compose logs spring-boot-app --tail=30
          fi
          
          # Afficher la ligne exacte du démarrage
          echo ""
          echo "📋 Ligne de démarrage du backend:"
          echo "$BACKEND_LOGS" | grep "Started DemoApplication" || echo "   (ligne non trouvée)"
          
          echo "========================================="
          echo "🔍 ÉTAPE 6: RECHERCHE DES ENDPOINTS (optionnel)"
          echo "========================================="
          
          ENDPOINTS=(
            "/"
            "/api"
            "/api/hello"
            "/api/users"
            "/hello"
            "/users"
            "/actuator/health"
          )
          
          for endpoint in "${ENDPOINTS[@]}"; do
            echo -n "🔍 Test: http://localhost:8081$endpoint ... "
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081$endpoint)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ TROUVÉ (code $HTTP_CODE)"
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "❌ Non trouvé (404)"
            else
              echo "⚠️ Code $HTTP_CODE"
            fi
          done
          
          echo "✅ Tests exécutés:"
          echo "   - Frontend accessible"
          echo "   - Backend démarré (Started DemoApplication)"
          echo ""
          echo "========================================="          echo "🎯 WORKFLOW COMPLÉTÉ AVEC SUCCÈS"
          echo "   - MySQL démarré"
          echo ""
          echo "   - ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest"
          echo "========================================="
          echo "   - ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest"
          echo "📦 Images construites et poussées:"
          docker compose logs --tail=30
          echo "========================================="
          echo "✅ RÉCAPITULATIF DU WORKFLOW"
        run: |
          echo "========================================="
      - name: Final verification
          
          
          echo "========================================="
          echo "========================================="
          echo "🎉🎉🎉 TEST TERMINÉ AVEC SUCCÈS 🎉🎉🎉"
          
          echo "========================================="
          docker compose down
          echo "🧹 ÉTAPE 8: NETTOYAGE"
          echo "========================================="
          echo "========================================="
          docker compose down
          
          echo "========================================="
          echo "🎉🎉🎉 TEST TERMINÉ AVEC SUCCÈS 🎉🎉🎉"
          echo "========================================="
          
      - name: Final verification
        run: |
          echo "========================================="
          echo "✅ RÉCAPITULATIF DU WORKFLOW"
          echo "========================================="
          echo "📦 Images construites et poussées:"
          echo "   - ${{ secrets.DOCKERHUB_ICHRAK }}/springboot-app:latest"
          echo "   - ${{ secrets.DOCKERHUB_ICHRAK }}/angular-app:latest"
          echo ""
          echo "✅ Tests exécutés:"
          echo "   - MySQL démarré"
          echo "   - Frontend accessible"
          echo "   - Backend démarré (Started DemoApplication)"
          echo ""
          echo "🎯 WORKFLOW COMPLÉTÉ AVEC SUCCÈS"
          echo "========================================="
